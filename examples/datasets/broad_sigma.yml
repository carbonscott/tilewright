# RIXS simulation sweep — batch source: 5 files x 2000 entities stacked
# along axis 0. Entity i's spectrum is /spectra[i]; its 12 params are row i
# of the (2000,) datasets under /params; /log_probs rides along per entity.
# Shared axes (/eloss, /omega_bounds) are plain metadata entries the author
# writes here — clients fetch them once via h5py from any source file.
key: BROAD_SIGMA
metadata:
  data_type: simulation
  material: NiPS3
  shared_eloss: /eloss
  shared_omega_bounds: /omega_bounds
source:
  batch:
    directory: /sdf/data/lcls/ds/prj/prjmaiqmag01/results/data-source/RIXS_SIM_BROAD_SIGMA
    pattern: "*/simulations.h5"
    params: {group: /params}
    extra: [/log_probs]
artifacts:
  - {type: rixs_spectrum, dataset: /spectra}
