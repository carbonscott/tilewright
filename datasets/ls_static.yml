# LCLS qRIXS static scans — files source: one matched file = one entity.
# Params are attributes on the HDF5 root; the 9 root datasets are artifacts.
# The directory also holds an S_52.nc netCDF twin; "*.h5" excludes it on purpose.
key: LCLS_RIXS_STATIC
metadata:
  data_type: experimental
  material: NiPS3
  method: RIXS
  facility: LCLS
source:
  files:
    directory: /sdf/data/lcls/ds/prj/prjmaiqmag01/results/data-source/LS/static
    pattern: "*.h5"
    params: {group: "/", from: attrs}
artifacts:
  - {type: I0, dataset: /I0}
  - {type: I_rn, dataset: /I_rn}
  - {type: S, dataset: /S}
  - {type: counts, dataset: /counts}
  - {type: energy, dataset: /energy}
  - {type: motor, dataset: /motor}
  - {type: motor_step, dataset: /motor_step}
  - {type: pixel, dataset: /pixel}
  - {type: rn, dataset: /rn}
